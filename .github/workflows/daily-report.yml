name: Polymarket Daily Report

on:
  schedule:
    - cron: '30 1 * * *'  # 北京时间 9:30 (UTC 1:30)
  workflow_dispatch:

jobs:
  scrape-and-save:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Run scraper
        id: scrape
        run: |
          node polymarket_api.js > output.log 2>&1
          cat output.log
        continue-on-error: true
      
      - name: Save report to GitHub
        if: always()
        run: |
          REPORT_FILE=$(ls -t polymarket_report_*.txt 2>/dev/null | head -1)
          
          if [ -n "$REPORT_FILE" ]; then
            echo "REPORT_CONTENT<<EOF" >> $GITHUB_ENV
            cat "$REPORT_FILE" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
            
            echo "REPORT_SUCCESS=true" >> $GITHUB_ENV
          else
            echo "REPORT_SUCCESS=false" >> $GITHUB_ENV
            echo "REPORT_CONTENT=数据获取失败" >> $GITHUB_ENV
          fi
      
      - name: Create Release with report
        if: always()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: daily-${{ github.run_number }}
          name: Polymarket Report ${{ github.run_number }}
          body: ${{ env.REPORT_CONTENT }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: polymarket-report-${{ github.run_number }}
          path: |
            polymarket_*.json
            polymarket_*.txt
            output.log
          retention-days: 30
